<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<title>All About Lunch Deli — Admin Wireframes</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Arial,sans-serif;font-size:14px;color:#051A2B;background:#e3ecf3;}

  /* ── Wireframe Navigator ── */
  #wfnav{background:#111;color:#fff;padding:8px 16px;display:none;align-items:center;gap:6px;flex-wrap:wrap;position:fixed;bottom:0;left:0;right:0;z-index:9999;border-top:2px solid #333;}
  #wfnav.open{display:flex;}
  #wfnav button{background:#2a2a2a;border:1px solid #444;color:#aaa;padding:4px 10px;font-size:11px;cursor:pointer;border-radius:2px;white-space:nowrap;}
  #wfnav button:hover{background:#3a3a3a;color:#fff;}
  #wfnav .wf-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666;margin-right:4px;white-space:nowrap;}
  #wftoggle{position:fixed;bottom:16px;right:16px;z-index:10000;background:#111;color:#aaa;border:1px solid #444;padding:5px 10px;font-size:11px;cursor:pointer;border-radius:4px;}
  #wfnav .wf-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666;margin-right:4px;white-space:nowrap;}
  #wfnav button{background:#2a2a2a;border:1px solid #444;color:#aaa;padding:5px 10px;font-size:11px;cursor:pointer;border-radius:2px;white-space:nowrap;}
  #wfnav button:hover{background:#3a3a3a;color:#fff;}
  #wfnav button.active{background:#fff;color:#111;border-color:#fff;font-weight:700;}

  /* ── Screen container ── */
  .screen{display:none;}
  .screen.active{display:block;}
  .screen-center{display:none;min-height:calc(100vh - 44px);align-items:center;justify-content:center;background:#e3ecf3;}
  .screen-center.active{display:flex;}

  /* ── Admin shell layout ── */
  .shell{display:flex;min-height:calc(100vh - 44px);}

  /* ── Sidebar ── */
  .sb{width:220px;background:#051A2B;color:#fff;flex-shrink:0;display:flex;flex-direction:column;}
  .sb-logo{padding:20px 20px 24px;border-bottom:1px solid #0d3155;}
  .sb-logo-box{background:#fff;display:flex;align-items:center;justify-content:center;padding:14px 18px;border-radius:10px;}
  .sb-logo-sub{display:none;}
  .sb nav{padding:24px 10px 12px;flex:1;overflow-y:auto;}
  .sb-section{padding:12px 10px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#ADC6DB;opacity:.6;}
  .sb-item{padding:9px 12px;cursor:pointer;font-size:13px;color:#ADC6DB;display:flex;align-items:center;gap:9px;border-left:3px solid transparent;border-radius:6px;margin-bottom:5px;}
  .sb-item:hover{background:#0d3155;color:#fff;}
  .sb-item.active{background:#0d3155;color:#fff;border-left-color:#AE1B21;}
  .sb-icon{font-size:17px;line-height:1;flex-shrink:0;opacity:.65;width:20px;text-align:center;}
  .sb-item.active .sb-icon,.sb-item:hover .sb-icon{opacity:1;}
  .sb-foot{padding:10px 20px 20px;}
  .sb-foot .sb-item{border:1px solid #1a5280;border-radius:6px;justify-content:center;font-size:12px;}

  /* ── Topbar ── */
  .topbar{background:#fff;border-bottom:1px solid #ccd7df;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .tb-left{display:flex;align-items:center;gap:14px;}
  .tb-title{font-size:16px;font-weight:700;color:#12426A;}
  .breadcrumb{font-size:12px;color:#bbb;}
  .tb-right{display:flex;align-items:center;gap:14px;}
  .notif-btn{position:relative;width:34px;height:34px;background:#f5f5f5;border:1px solid #ccd7df;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;}
  .notif-dot{position:absolute;top:-2px;right:-2px;width:16px;height:16px;background:#AE1B21;color:#fff;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;}
  .user-chip{display:flex;align-items:center;gap:7px;background:#f5f5f5;border:1px solid #ccd7df;padding:4px 10px 4px 4px;border-radius:6px;cursor:pointer;position:relative;}
  .user-av{width:26px;height:26px;background:#aaa;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;}
  .user-name{font-size:12px;color:#666;}
  .user-dropdown{display:none;position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid #ccd7df;border-radius:6px;min-width:140px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:999;}
  .user-dropdown a{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;color:#051A2B;text-decoration:none;white-space:nowrap;}
  .user-dropdown a:hover{background:#f5f9fc;}
  .user-chip.open .user-dropdown{display:block;}

  /* ── Content area ── */
  .content{flex:1;display:flex;flex-direction:column;}
  .content-scroll{flex:1;overflow-y:auto;background:#e3ecf3;}
  .inner{padding:24px;}

  /* ── Page header ── */
  .page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .page-title{font-size:20px;font-weight:700;color:#12426A;}
  .page-actions{display:flex;gap:8px;}

  /* ── Buttons ── */
  .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;font-size:13px;border:1px solid #333;cursor:pointer;background:#fff;color:#333;font-weight:500;border-radius:6px;line-height:1;}
  .btn-primary{background:#AE1B21;color:#fff;border-color:#AE1B21;}
  .btn-sm{padding:8px 11px;font-size:12px;}
  .btn-ghost{border-color:#ccd7df;color:#777;}
  .btn-ghost:hover{border-color:#999;color:#444;}
  .btn-danger{border-color:#bbb;color:#999;}
  .btn-outline{border-color:#555;color:#444;}
  .btn-full{width:100%;justify-content:center;}

  /* ── Cards ── */
  .card{background:#fff;border:1px solid #ccd7df;padding:20px;}
  .card+.card{margin-top:16px;}
  .card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #ccd7df;}
  .card-title{font-size:13px;font-weight:700;color:#051A2B;text-transform:uppercase;letter-spacing:.5px;}

  /* ── Stat cards ── */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
  .stat{background:#fff;border:1px solid #ccd7df;padding:18px;}
  .stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#aaa;margin-bottom:8px;}
  .stat-val{font-size:26px;font-weight:700;color:#AE1B21;}
  .stat-sub{font-size:11px;color:#bbb;margin-top:4px;}
  .stat-bar{margin-top:10px;height:3px;background:#ebebeb;}
  .stat-bar-fill{height:100%;background:#12426A;}

  /* ── Notification banner ── */
  .alert{background:#fff;border:1px solid #ccd7df;border-left:4px solid #555;padding:12px 18px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:20px;}
  .alert-info{border-left-color:#aaa;}
  .alert-warn{border-left-color:#888;}
  .alert-text{font-size:13px;color:#051A2B;}
  .alert-text strong{color:#051A2B;}
  .alert-sub{font-size:11px;color:#aaa;margin-top:3px;}

  /* ── Toggles ── */
  .toggle-row{display:flex;gap:20px;align-items:center;}
  .toggle-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#666;}
  .toggle-sw{width:38px;height:21px;background:#ccc;border-radius:12px;position:relative;cursor:pointer;flex-shrink:0;}
  .toggle-sw.on{background:#12426A;}
  .toggle-sw::after{content:'';position:absolute;width:17px;height:17px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .toggle-sw.on::after{left:19px;}

  /* ── Tables ── */
  .tbl-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{background:#f7f7f7;border:1px solid #ccd7df;padding:9px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#888;font-weight:700;}
  td{border:1px solid #ccd7df;padding:9px 12px;color:#051A2B;vertical-align:middle;background:#fff;}
  tr:hover td{background:#f5f9fc;}
  /* Strip cell borders that double up against the card's outer border */
  .card table th:first-child,.card table td:first-child{border-left:none;}
  .card table th:last-child,.card table td:last-child{border-right:none;}
  .card table thead th{border-top:none;}
  .card table tbody tr:last-child td{border-bottom:none;}
  input[type=checkbox]{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:2px solid #12426A;border-radius:3px;background:#fff;cursor:pointer;position:relative;vertical-align:middle;flex-shrink:0;}
  input[type=checkbox]:checked{background:#12426A;border-color:#12426A;}
  input[type=checkbox]:checked::after{content:'✓';position:absolute;color:#fff;font-size:11px;font-weight:700;top:50%;left:50%;transform:translate(-50%,-50%);line-height:1;}

  /* ── Status badges ── */
  .badge{display:inline-block;padding:2px 8px;font-size:10px;border-radius:2px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .b-pending{background:#f5f5f5;color:#aaa;border:1px solid #ccd7df;}
  .b-confirmed{background:#e8e8e8;color:#666;border:1px solid #ccd7df;}
  .b-progress{background:#d5d5d5;color:#444;border:1px solid #bbb;}
  .b-complete{background:#051A2B;color:#fff;}
  .b-cancelled{background:#f8f8f8;color:#bbb;border:1px solid #ccd7df;text-decoration:line-through;}

  /* ── Tabs ── */
  .tabs{display:flex;border-bottom:2px solid #ccd7df;margin-bottom:20px;}
  .tab{padding:10px 20px;font-size:13px;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
  .tab.active{color:#12426A;border-bottom-color:#AE1B21;font-weight:700;}

  /* ── Two-column layouts ── */
  .col2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .col3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
  .col-sidebar{display:grid;grid-template-columns:270px 1fr;gap:18px;}
  .col-detail{display:grid;grid-template-columns:1fr 340px;gap:18px;}

  /* ── Inherit font on all form elements ── */
  input,select,textarea,button{font-family:Arial,sans-serif;}

  /* ── Forms ── */
  .fg{margin-bottom:14px;}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .flbl{display:block;font-size:11px;font-weight:700;color:#051A2B;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
  .finput{width:100%;padding:8px 11px;border:1px solid #ccd7df;background:#fff;font-size:13px;color:#051A2B;border-radius:6px;}
  .finput:focus{outline:none;border-color:#888;}
  .fsel{width:100%;padding:8px 11px;border:1px solid #ccd7df;background:#fff;font-size:13px;color:#051A2B;border-radius:6px;}
  .ftxt{width:100%;padding:8px 11px;border:1px solid #ccd7df;background:#fff;font-size:13px;color:#051A2B;min-height:80px;resize:vertical;border-radius:6px;}

  /* ── Category list ── */
  .cat-list{background:#fff;border:1px solid #ccd7df;}
  .cat-item{padding:11px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:13px;}
  .cat-item:last-child{border-bottom:none;}
  .cat-item:hover{background:#fafafa;}
  .cat-item.active{background:#f0f0f0;border-left:3px solid #AE1B21;padding-left:11px;}
  .cat-name{font-weight:600;color:#051A2B;}
  .cat-count{font-size:11px;color:#bbb;}

  /* ── Menu item cards ── */
  .mi-card{border:1px solid #ccd7df;background:#fff;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
  .mi-img{width:46px;height:46px;background:#e8e8e8;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#aaa;border:1px solid #ccd7df;}
  .mi-info{flex:1;}
  .mi-name{font-size:13px;font-weight:600;color:#12426A;margin-bottom:2px;}
  .mi-desc{font-size:11px;color:#aaa;}
  .mi-avail{display:flex;align-items:center;gap:6px;font-size:11px;color:#888;margin-top:5px;}
  .mi-price{font-size:14px;font-weight:700;color:#12426A;flex-shrink:0;margin:0 12px;}
  .mi-acts{display:flex;gap:6px;flex-shrink:0;}

  /* ── Upload area ── */
  .upload{border:2px dashed #ccd7df;background:#fafafa;padding:28px;text-align:center;margin-bottom:12px;}
  .upload p{font-size:13px;color:#aaa;}
  .upload small{font-size:11px;color:#ccc;display:block;margin-top:4px;}

  /* ── Filter bar ── */
  .fbar{display:flex;align-items:flex-end;gap:12px;margin-bottom:20px;flex-wrap:wrap;}

  /* ── Chart placeholder ── */
  .chart{background:#fff;border:1px solid #ccd7df;height:220px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:13px;}

  /* ── Info banner ── */
  .info-bar{background:#f7f7f7;border:1px solid #ccd7df;border-left:4px solid #bbb;padding:11px 15px;margin-bottom:18px;font-size:12px;color:#777;}
  .info-bar strong{color:#555;}

  /* ── Location cards ── */
  .loc-card{background:#fff;border:1px solid #ccd7df;padding:16px;margin-bottom:12px;display:flex;align-items:flex-start;justify-content:space-between;}
  .loc-name{font-size:14px;font-weight:700;color:#12426A;margin-bottom:4px;}
  .loc-detail{font-size:12px;color:#999;line-height:1.7;}

  /* ── Order panel ── */
  .order-panel{background:#fff;border:1px solid #ccd7df;padding:20px;}
  .op-hd{font-size:14px;font-weight:700;color:#12426A;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #ccd7df;display:flex;justify-content:space-between;align-items:center;}
  .op-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px;}
  .op-total{display:flex;justify-content:space-between;padding:12px 0 0;font-weight:700;font-size:14px;}
  .op-meta{font-size:12px;color:#aaa;line-height:1.8;margin-bottom:14px;}

  /* ── Pagination ── */
  .pager{display:flex;gap:4px;margin-top:16px;}
  .pg{width:32px;height:32px;border:1px solid #ccd7df;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:#666;}
  .pg.active{background:#12426A;color:#fff;border-color:#12426A;}

  /* ── Login card ── */
  .login-card{background:#fff;border:1px solid #ccd7df;padding:40px;width:380px;}
  .login-logo{text-align:center;margin-bottom:30px;}
  .login-logo-box{display:inline-flex;align-items:center;justify-content:center;}
  .login-logo p{font-size:13px;color:#aaa;margin-top:10px;}

  /* ── Checkbox group ── */
  .cb-group{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;}
  .cb-item{display:flex;align-items:center;gap:5px;font-size:13px;color:#555;}
  .cb-item input[type=checkbox]{width:16px;}

  /* ── Option Groups ── */
  .og-wrap{display:flex;flex-direction:column;gap:8px;}
  .og{border:1px solid #ccd7df;background:#fff;}
  .og-hd{padding:10px 14px;background:#f7f7f7;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #ccd7df;}
  .og-hd-left{display:flex;align-items:center;gap:8px;}
  .og-arrow{font-size:10px;color:#bbb;width:12px;}
  .og-name{font-size:13px;font-weight:700;color:#333;}
  .og-count{font-size:11px;color:#bbb;margin-left:4px;}
  .og-hd-right{display:flex;align-items:center;gap:12px;}
  .og-req{font-size:11px;color:#888;display:flex;align-items:center;gap:5px;}
  .og-body{padding:0 8px 8px;}
  .og-opt{display:flex;align-items:center;gap:8px;padding:7px 6px;border-bottom:1px solid #f5f5f5;}
  .og-opt:last-of-type{border-bottom:none;}
  .og-opt-name{flex:1;font-size:13px;color:#444;}
  .og-opt-fee{font-size:11px;color:#777;background:#f5f5f5;border:1px solid #ccd7df;padding:2px 8px;border-radius:2px;min-width:52px;text-align:center;flex-shrink:0;}
  .og-opt-fee.has-fee{background:#ebebeb;color:#444;font-weight:700;}
  .og-add{display:flex;align-items:center;gap:6px;padding:8px 6px 2px;border-top:1px dashed #ccd7df;margin-top:4px;}
  .og-collapsed .og-body{display:none;}
  .og-collapsed .og-hd{border-bottom:none;}

  /* ── Time chip ── */
  .time-chip{display:inline-block;background:#f0f0f0;border:1px solid #ccd7df;padding:2px 8px;font-size:11px;color:#777;border-radius:2px;}

  /* ── Divider ── */
  .divider{height:1px;background:#ebebeb;margin:20px 0;}

  /* ── Empty state ── */
  .empty{text-align:center;padding:48px;color:#ccc;}
  .empty p{font-size:13px;}

  /* ── Revenue grid ── */
  .rev-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px;}

  /* ── Client actions ── */
  td.name-cell{font-weight:600;color:#333;}
  .inline-acts{display:flex;gap:6px;}
  /* ── Availability panel tabs ── */
  .av-panel{background:#fff;border:1px solid #ccd7df;border-left:4px solid #12426A;margin-bottom:22px;}
  .av-panel.av-collapsed .av-tabs,.av-panel.av-collapsed .av-body{display:none;}
  .av-chevron{font-size:16px;line-height:1;color:#aaa;background:none;border:none;cursor:pointer;padding:4px 6px;transition:transform .2s;}
  .av-panel.av-collapsed .av-chevron{transform:rotate(-90deg);}
  .av-tabs{display:flex;border-bottom:1px solid #ccd7df;}
  .av-tab{padding:10px 20px;font-size:12px;font-weight:700;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;text-transform:uppercase;letter-spacing:.5px;}
  .av-tab.active{color:#12426A;border-bottom-color:#AE1B21;}
  .av-body{padding:18px 20px;}
  .av-section{margin-bottom:22px;}
  .av-section:last-child{margin-bottom:0;}
  .av-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#888;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #f0f0f0;}
  .av-days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:10px;}
  .av-day{text-align:center;}
  .av-day-lbl{font-size:10px;color:#aaa;text-transform:uppercase;margin-bottom:5px;letter-spacing:.4px;}
  .av-day-times{display:flex;flex-direction:column;gap:4px;margin-top:6px;}
  .av-day-times input{width:100%;font-size:11px;padding:3px 5px;border:1px solid #ccd7df;border-radius:2px;color:#444;background:#fafafa;text-align:center;}
  .av-day-times input:disabled{background:#f5f5f5;color:#ccc;}
  .closed-list{display:flex;flex-direction:column;gap:6px;}
  .closed-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#fafafa;border:1px solid #ccd7dfe;border-radius:3px;font-size:13px;color:#444;}
  .closed-item-meta{font-size:11px;color:#bbb;margin-left:8px;}
  .av-add-row{display:flex;gap:8px;align-items:center;margin-top:10px;}
  .special-list{display:flex;flex-direction:column;gap:6px;}
  .special-item{display:flex;align-items:center;gap:10px;padding:7px 10px;background:#fafafa;border:1px solid #ccd7df;border-radius:3px;font-size:13px;color:#444;}

  /* ── Dark blue text overrides ── */
  .breadcrumb,.user-name,.stat-lbl,.stat-sub,.tab,.toggle-item,.cat-count,
  .mi-desc,.mi-avail,.info-bar,.loc-detail,.op-meta,.pg,.login-logo p,
  .cb-item,.og-arrow,.og-count,.og-req,.og-opt-fee,.time-chip,.empty,
  .av-chevron,.av-tab,.av-section-title,.av-day-lbl,.closed-item-meta,
  .btn-ghost,.btn-danger,.chart,th{color:#051A2B;}
  .info-bar strong{color:#051A2B;}
  .btn-ghost:hover{color:#051A2B;}

  /* ── Mobile responsive ── */
  .sb-toggle { display: none; }
  .tb-search { position: relative; display: flex; align-items: center; }
  .tb-search input { display: block; }
  .tb-search-icon { display: none; }

  @media (max-width: 768px) {
    /* Sidebar: off-canvas overlay */
    .sb { position: fixed; top: 0; left: 0; bottom: 0; z-index: 1000;
          transform: translateX(-100%); transition: transform .25s ease; }
    .sb.sb-open { transform: translateX(0); }
    .sb-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45);
                  z-index: 999; display: none; }
    .sb-overlay.sb-open { display: block; }

    /* Hamburger button */
    .sb-toggle { display: flex; align-items: center; justify-content: center;
                 width: 34px; height: 34px; background: #f5f5f5;
                 border: 1px solid #ccd7df; border-radius: 6px;
                 cursor: pointer; font-size: 20px; color: #051A2B;
                 flex-shrink: 0; margin-right: 4px; line-height: 1; }

    /* Topbar */
    .topbar { padding: 0 12px; }
    .breadcrumb { display: none; }
    .tb-title { font-size: 14px; }

    /* Content padding */
    .inner { padding: 12px; }

    /* Search: icon-only on mobile */
    .tb-search input { display: none; }
    .tb-search { width: 34px; height: 34px; background: #f5f5f5;
                 border: 1px solid #ccd7df; border-radius: 6px;
                 justify-content: center; cursor: pointer; flex-shrink: 0; }
    .tb-search i { position: static !important; font-size: 16px !important;
                   color: #051A2B !important; pointer-events: auto !important; }

    /* Stats grid: 2 columns */
    .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .rev-grid { grid-template-columns: 1fr; }

    /* All two/three/sidebar column layouts collapse */
    .col2, .col3, .col-detail, .col-sidebar { grid-template-columns: 1fr; }

    /* Form rows collapse */
    .frow, .frow3 { grid-template-columns: 1fr; }

    /* Page header stacks */
    .page-hd { flex-direction: column; align-items: flex-start; gap: 10px; }
    .page-actions { flex-wrap: wrap; }

    /* Card header wraps */
    .card-hd { flex-wrap: wrap; gap: 8px; }

    /* Filter bar: inputs fill row */
    .fbar .fg { flex: 1 1 calc(50% - 6px); min-width: 0; }

    /* Tables: stacked card rows */
    .tbl-wrap { overflow-x: visible; }
    .tbl-wrap table thead { display: none; }
    .tbl-wrap table,
    .tbl-wrap table tbody,
    .tbl-wrap table tr,
    .tbl-wrap table td { display: block; width: 100%; box-sizing: border-box; }
    .tbl-wrap table tr { border: 1px solid #ccd7df; margin-bottom: 10px;
                         border-radius: 4px; overflow: hidden; }
    .tbl-wrap table tr:hover td { background: #fff; }
    .tbl-wrap table td { border: none; border-bottom: 1px solid #f5f5f5;
                         display: flex; justify-content: space-between;
                         align-items: center; padding: 9px 12px;
                         text-align: right; gap: 8px; }
    .tbl-wrap table td:last-child { border-bottom: none; }
    .tbl-wrap table td::before { content: attr(data-label);
                                  font-weight: 700; font-size: 10px;
                                  text-transform: uppercase; letter-spacing: .5px;
                                  color: #888; text-align: left;
                                  flex-shrink: 0; white-space: nowrap; }
    .tbl-wrap table td .inline-acts { justify-content: flex-end; }

    /* Shell takes full width */
    .shell { min-height: 100vh; }
  }

  /* ── Mobile order bottom-sheet modal ── */
  .mob-modal-backdrop { display: none; }

  @media (max-width: 768px) {
    .mob-modal-backdrop {
      display: none; position: fixed; inset: 0; z-index: 1500;
      background: rgba(0,0,0,.5);
      align-items: flex-end;
    }
    .mob-modal-backdrop.open { display: flex; }
    .mob-modal-sheet {
      background: #fff; width: 100%; max-height: 85vh;
      overflow-y: auto; border-radius: 12px 12px 0 0;
      padding: 0 16px 28px;
    }
    .mob-modal-bar {
      display: flex; align-items: center; justify-content: flex-end;
      padding: 14px 0 10px; position: sticky; top: 0; background: #fff;
      border-bottom: 1px solid #ccd7df; margin-bottom: 14px;
    }
    .mob-modal-drag { position: absolute; left: 50%;
                      transform: translateX(-50%);
                      width: 36px; height: 4px; background: #ddd;
                      border-radius: 2px; }
    .mob-modal-close {
      background: none; border: none; font-size: 22px; cursor: pointer;
      color: #999; line-height: 1; padding: 0;
      width: 30px; height: 30px; display: flex;
      align-items: center; justify-content: center;
    }
  }

  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr; }
    .tb-right .notif-btn,
    .tb-right .user-name { display: none; }
    .inner { padding: 10px; }
  }
</style>
</head>

  return `<div class="topbar">

}

    const css = `
      * { box-sizing: border-box; margin: 0; padding: 0; }

      .ticket {

        page-break-inside: avoid;
        display: flex;
        flex-direction: row;
      }
      .t-logo-col {
        width: 80px;
        flex-shrink: 0;
        border-right: 1px solid #ccc;

        align-items: center;
        justify-content: center;

      .t-logo-col img {

      '.t-addr { font-size: 12px; margin-bottom: 2px; }',
      '.t-headcount { font-size: 12px; font-weight: bold; margin-top: 3px; }',
      '.t-divider { border: none; border-top: 1px solid #ccc; margin: 6px 0; }',
      '.t-body { padding: 8px 14px 10px; }',
      '.t-item { font-size: 13px; margin-bottom: 4px; line-height: 1.4; }',
      '.t-special { font-weight: bold; font-size: 13px; margin-top: 8px; padding-top: 6px; border-top: 1px solid #eee; }',
      '.t-totals { border-top: 1px solid #ccc; margin-top: 10px; padding-top: 6px; font-size: 13px; }',
      '.t-total-row { display: flex; justify-content: space-between; margin-bottom: 3px; }',
      '.t-total-bold { font-weight: bold; margin-top: 2px; }',
      '@media print { body { margin: 0; padding: 8px; } .ticket { page-break-inside: avoid; margin-bottom: 14px; } }'
    ].join(' ');

    var ticketsHtml = ticketsToPrint.map(function(t) {
      var itemsHtml = t.items.map(function(item) {
        return '<div class="t-item">' + item + '</div>';
      }).join('');
      var specialHtml = t.notes ? '<div class="t-special">Special Notes: ' + t.notes + '</div>' : '';
      var addrHtml = t.type === 'Delivery'
        ? '<div class="t-addr">Deliver to: ' + t.address + '</div>'
        : '<div class="t-addr">Customer Pickup</div>';
      var tipRow = t.tip ? '<div class="t-total-row"><span>Tip</span><span>' + t.tip + '</span></div>' : '';
      return '<div class="ticket">'
        + '<div class="t-logo-top"><img src="' + catLogoSrc + '" alt="All About Lunch Deli"></div>'
        + '<div class="t-head">'
        + '<div class="t-meta">' + t.date + '&nbsp;&nbsp;' + t.time + '&nbsp;&nbsp;&nbsp;&nbsp;' + t.type + ' &mdash; Order ' + t.order + '</div>'
        + '<div class="t-name">' + t.company + '</div>'
        + '<div class="t-contact">Contact: ' + t.contact + '&nbsp;&nbsp;&bull;&nbsp;&nbsp;' + t.phone + '&nbsp;&nbsp;&bull;&nbsp;&nbsp;' + t.email + '</div>'
        + addrHtml
        + '<div class="t-headcount">Head Count: ' + t.headCount + '</div>'
        + '</div>'
        + '<hr class="t-divider">'
        + '<div class="t-body">'
        + itemsHtml
        + specialHtml
        + '<div class="t-totals">'
        + '<div class="t-total-row"><span>Subtotal</span><span>' + t.subtotal + '</span></div>'
        + '<div class="t-total-row"><span>Sales Tax</span><span>' + t.tax + '</span></div>'
        + tipRow
        + '<div class="t-total-row t-total-bold"><span>Total</span><span>' + t.total + '</span></div>'
        + '</div>'
        + '</div>'
        + '</div>';
    }).join('');

    var w = window.open('', 'CateringTickets', 'width=960,height=720');
    w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Catering Tickets</title><style>' + css + '</style></head><body>' + ticketsHtml + '</body></html>');
    w.document.close();
    w.focus();
    setTimeout(function() { w.print(); }, 400);
  }

  function showDelMenuItem(idx) {
    var items = [
      { name: 'Classic Club Sandwich', price: '$12.50', available: true,
        groups: ['Bread Choice|10','Cheese Choice|6','Substitute Chips|4','Condiments|8'] },
      { name: 'Corned Beef on Rye',    price: '$13.00', available: true,
        groups: ['Bread Choice|4','Cheese Choice|4','Condiments|6'] },
      { name: 'Italian Sub',           price: '$11.50', available: false,
        groups: ['Bread Choice|6','Cheese Choice|5','Substitute Chips|4','Condiments|7'] }
    ];
    var it = items[idx];

    var breadOpts = [
      ['White','+$0.00'],['Gourmet Potato Roll','+$0.00'],['Plain Wrap','+$0.00'],
      ['Gluten Free Bun','+$1.50'],['Wheatberry','+$0.00'],['Pretzel Roll','+$1.00'],
      ['Honey Wheat Wrap','+$0.00'],['Marble Rye','+$0.00'],['Sourdough','+$0.00'],['Rye','+$0.00']
    ];
    var sw24 = '<div class="toggle-sw on" style="width:24px;height:14px;flex-shrink:0;"></div>';
    var breadRows = breadOpts.slice(0, parseInt(it.groups[0].split('|')[1])).map(function(o) {
      var fee = o[1] === '+$0.00' ? 'og-opt-fee' : 'og-opt-fee has-fee';
      return '<div class="og-opt">' + sw24 + '<span class="og-opt-name">' + o[0] + '</span>'
           + '<span class="' + fee + '">' + o[1] + '</span>' + sw24
           + '<button class="btn btn-sm btn-danger" style="padding:2px 6px;font-size:11px;">✕</button></div>';
    }).join('');
    var colHdr = '<div style="display:grid;grid-template-columns:24px 1fr 70px 50px 28px;align-items:center;gap:8px;'
               + 'padding:5px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#bbb;'
               + 'border-bottom:1px solid #f0f0f0;">'
               + '<span></span><span>Option Name</span><span>Add-On Fee</span>'
               + '<span style="text-align:center;">Active</span><span></span></div>';

    var groupsHtml = it.groups.map(function(g, gi) {
      var parts = g.split('|');
      var gname = parts[0]; var gcount = parts[1];
      var expanded = (gi === 0);
      var cls = expanded ? 'og' : 'og og-collapsed';
      var arrow = expanded ? '▼' : '▶';
      var body = expanded
        ? '<div class="og-body">' + colHdr + breadRows + '</div>'

      return '<div class="' + cls + '">'

           + body + '</div>';
    }).join('');

    var availOpts = ['Available','Unavailable'].map(function(o) {
      return '<option' + (it.available === (o==='Available') ? ' selected' : '') + '>' + o + '</option>';
    }).join('');
    var catOpts = ['Deli Favorites','Hot Favorites','Salads','Soups','Daily Specials','Drinks','Misc'].map(function(c,ci) {
      return '<option' + (ci===0?' selected':'') + '>' + c + '</option>';

    document.getElementById('del-edit-panel').innerHTML =

      + '<button class="btn btn-sm btn-ghost">Cancel</button></div>'

      + '<div class="fg"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'
      + '<label class="flbl" style="margin:0;">Options / Add-On Groups</label>'

      + '<div class="og-wrap">' + groupsHtml + '</div></div>'

      + '<div class="fg"><label class="flbl">Availability</label>'

      + '<div style="display:flex;gap:8px;justify-content:flex-end;">'
      + '<button class="btn btn-danger btn-sm">Delete Item</button>'

    var btn = e.target.closest('.sb-toggle');

    if (btn) {
      var shell = btn.closest('.shell');
      if (shell) {
        shell.querySelector('.sb').classList.toggle('sb-open');
        shell.querySelector('.sb-overlay').classList.toggle('sb-open');
      }
    } else if (ov) {
      var shell = ov.closest('.shell');
      if (shell) {
        shell.querySelector('.sb').classList.remove('sb-open');
        ov.classList.remove('sb-open');
      }
    }
  });
